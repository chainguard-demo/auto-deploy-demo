apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-demo
  namespace: demo
  labels:
    app: python-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-demo
  template:
    metadata:
      labels:
        app: python-demo
      annotations:
        # Forces a new ReplicaSet on every apply (handy for repeated demos)
        demo.chainguard.dev/rollout: "bad-image-v3.12.11"
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: python-demo
          # BAD/FAIL DEMO:
          # - tag-based ref (not digest pinned)
          # - choose the image you expect Gatekeeper to reject (old + vulnerable, or unsigned/unattested)
          image: 452336408843.dkr.ecr.us-west-2.amazonaws.com/python-openssl:3.12.11
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          command: ["python", "-m", "http.server", "8080"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: python-demo
  namespace: demo
spec:
  type: ClusterIP
  selector:
    app: python-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
replicas: 3
revisionHistoryLimit: 10
auditInterval: 60
metricsBackends: ["prometheus"]
auditMatchKindOnly: false
constraintViolationsLimit: 20
auditFromCache: false
disableAudit: false
disableMutation: false
disableValidatingWebhook: false

validatingWebhookName: gatekeeper-validating-webhook-configuration
validatingWebhookTimeoutSeconds: 3
validatingWebhookFailurePolicy: Ignore
validatingWebhookAnnotations: {}
validatingWebhookExemptNamespacesLabels: {}
validatingWebhookObjectSelector: {}
validatingWebhookMatchConditions: []
validatingWebhookCheckIgnoreFailurePolicy: Fail
validatingWebhookCustomRules: {}
validatingWebhookSubResources:
  - pods/ephemeralcontainers
  - pods/exec
  - pods/log
  - pods/eviction
  - pods/portforward
  - pods/proxy
  - pods/attach
  - pods/binding
  - pods/resize
  - deployments/scale
  - replicasets/scale
  - statefulsets/scale
  - replicationcontrollers/scale
  - services/proxy
  - nodes/proxy
  - services/status
validatingWebhookURL: null
validatingWebhookScope: "*"

enableDeleteOperations: false
enableConnectOperations: false
enableExternalData: true
enableGeneratorResourceExpansion: true
enableTLSHealthcheck: false
maxServingThreads: -1

mutatingWebhookName: gatekeeper-mutating-webhook-configuration
mutatingWebhookFailurePolicy: Ignore
mutatingWebhookReinvocationPolicy: Never
mutatingWebhookAnnotations: {}
mutatingWebhookExemptNamespacesLabels: {}
mutatingWebhookObjectSelector: {}
mutatingWebhookMatchConditions: []
mutatingWebhookTimeoutSeconds: 1
mutatingWebhookCustomRules: {}
mutatingWebhookSubResources:
  - pods/ephemeralcontainers
  - pods/exec
  - pods/log
  - pods/eviction
  - pods/portforward
  - pods/proxy
  - pods/attach
  - pods/binding
  - deployments/scale
  - replicasets/scale
  - statefulsets/scale
  - replicationcontrollers/scale
  - services/proxy
  - nodes/proxy
  - services/status
mutatingWebhookURL: null
mutatingWebhookScope: "*"
mutationAnnotations: false

auditChunkSize: 500
logLevel: INFO
logDenies: false
logMutations: false
admissionEventsInvolvedNamespace: false
auditEventsInvolvedNamespace: false
resourceQuota: true
externaldataProviderResponseCacheTTL: 3m
enableK8sNativeValidation: true

commonAnnotations: {}
extraVolumeMounts: []
extraVolumes: []

#
# IMPORTANT:
# - Keep Gatekeeper manager/audit using upstream image (has /manager).
# - Use your Chainguard/ECR CRDs image only for CRD/label jobs.
#
image:
  # Gatekeeper runtime (manager/audit) image
  repository: openpolicyagent/gatekeeper
  release: v3.21.1
  pullPolicy: IfNotPresent
  pullSecrets: []

  # CRDs/utility jobs image (your Chainguard/ECR image)
  crdRepository: 452336408843.dkr.ecr.us-west-2.amazonaws.com/gatekeeper-crds

preInstall:
  crdRepository:
    image:
      repository: 452336408843.dkr.ecr.us-west-2.amazonaws.com/gatekeeper-crds
      tag: v3.21.1

postUpgrade:
  labelNamespace:
    serviceAccount:
      name: gatekeeper-update-namespace-label-post-upgrade
      create: true
    enabled: false
    image:
      repository: 452336408843.dkr.ecr.us-west-2.amazonaws.com/gatekeeper-crds
      tag: v3.21.1
      pullPolicy: IfNotPresent
      pullSecrets: []

postInstall:
  labelNamespace:
    serviceAccount:
      name: gatekeeper-update-namespace-label
      create: true
    enabled: true
    image:
      repository: 452336408843.dkr.ecr.us-west-2.amazonaws.com/gatekeeper-crds
      tag: v3.21.1
      pullPolicy: IfNotPresent
      pullSecrets: []

preUninstall:
  deleteWebhookConfigurations:
    serviceAccount:
      name: gatekeeper-delete-webhook-configs
      create: true
    enabled: false
    image:
      repository: 452336408843.dkr.ecr.us-west-2.amazonaws.com/gatekeeper-crds
      tag: v3.21.1
      pullPolicy: IfNotPresent
      pullSecrets: []

controllerManager:
  containerName: manager
  port: 8443
  metricsPort: 8888
  healthPort: 9090
  priorityClassName: system-cluster-critical
  nodeSelector:
    kubernetes.io/os: linux
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsGroup: 999
    runAsNonRoot: true
    runAsUser: 1000
  podSecurityContext:
    fsGroup: 999
    supplementalGroups: [999]

audit:
  containerName: manager
  metricsPort: 8888
  healthPort: 9090
  priorityClassName: system-cluster-critical
  nodeSelector:
    kubernetes.io/os: linux
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsGroup: 999
    runAsNonRoot: true
    runAsUser: 1000
  podSecurityContext:
    fsGroup: 999
    supplementalGroups: [999]

crds:
  nodeSelector:
    kubernetes.io/os: linux
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532

pdb:
  controllerManager:
    minAvailable: 1

rbac:
  create: true

serviceAccount:
  gatekeeperAdmin:
    create: true

disabledBuiltins:
  - "{http.send}"

enableRuntimeDefaultSeccompProfile: true
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockcriticalhighvulns
spec:
  crd:
    spec:
      names:
        kind: K8sBlockCriticalHighVulns
      validation:
        openAPIV3Schema:
          type: object
          properties:
            requiredAnnotationKey:
              type: string
            maxSeverityAnnotationKey:
              type: string
            criticalHighCountAnnotationKey:
              type: string
            allowedMaxSeverities:
              type: array
              items:
                type: string
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sblockcriticalhighvulns

      # Helper: get annotations from Pod or workload template
      get_annotations(obj) = ann {
        ann := obj.metadata.annotations
      } else = ann {
        ann := obj.spec.template.metadata.annotations
      } else = ann {
        ann := {}
      }

      # 1️⃣ Missing CI annotation
      violation[{"msg": msg}] {
        ann := get_annotations(input.review.object)
        required := input.parameters.requiredAnnotationKey
        not ann[required]
        msg := sprintf("missing required annotation %q (expected CI vuln verdict from GitHub)", [required])
      }

      # 2️⃣ Block if max severity not allowed
      violation[{"msg": msg}] {
        ann := get_annotations(input.review.object)
        maxKey := input.parameters.maxSeverityAnnotationKey
        max := ann[maxKey]

        not allowed_max(max)
        msg := sprintf("blocked: maxSeverity=%q not allowed (Critical/High should be blocked)", [max])
      }

      # 3️⃣ Block if critical/high count > 0
      violation[{"msg": msg}] {
        ann := get_annotations(input.review.object)
        cntKey := input.parameters.criticalHighCountAnnotationKey
        cntStr := ann[cntKey]
        cnt := to_number(cntStr)
        cnt > 0
        msg := sprintf("blocked: criticalHighCount=%v (must be 0)", [cnt])
      }

      allowed_max(max) {
        allowed := input.parameters.allowedMaxSeverities
        allowed[_] == max
      }
name: deploy-main

on:
  pull_request:
    types: [closed]

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER_NAME: fpd2-eks

  ECR_REPO: python-openssl

  NAMESPACE: demo
  APP_NAME: python-demo

permissions: {}

jobs:
  push-image:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'apply-cve-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.out.outputs.image }}
      ci_run_id: ${{ steps.runid.outputs.ci_run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Set CI run id output
        id: runid
        run: echo "ci_run_id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Setup Go environment
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed
        with:
          cache: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.FPD_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install crane
        run: |
          set -euo pipefail
          go install github.com/google/go-containerregistry/cmd/crane@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          crane version

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da

      - name: Install Grype (pinned release)
        run: |
          set -euo pipefail
          GRYPE_VERSION="v0.91.2"
          curl -sSfL "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin grype
          grype version

      - uses: chainguard-dev/setup-chainctl@8d93dcbef466d3cf3533f67084f52eb74ef9d262
        with:
          identity: "4cf15780a13a9b6576d8b357e6524554c8c12a18/a662f56b58103354"

      - name: Auth to Chainguard registry (cgr.dev)
        run: |
          set -euo pipefail
          chainctl auth configure-docker

      - name: Read source image from merged PR content
        id: src
        run: |
          set -euo pipefail
          SRC="$(cat demo-results/new-image.txt)"
          echo "src=$SRC" >> "$GITHUB_OUTPUT"
          echo "Using source image: $SRC"

      - name: Copy image to ECR (and output digest-pinned ref)
        id: out
        run: |
          set -euo pipefail
          ECR="${{ steps.login-ecr.outputs.registry }}"
          TAG="${{ github.sha }}"
          DST_REPO="${ECR}/${{ env.ECR_REPO }}"
          DST="${DST_REPO}:${TAG}"

          echo "Copying:"
          echo "  SRC=${{ steps.src.outputs.src }}"
          echo "  DST=$DST"

          crane copy "${{ steps.src.outputs.src }}" "$DST"

          DIGEST="$(crane digest "$DST")"
          DST_REF="${DST_REPO}@${DIGEST}"

          echo "image=$DST_REF" >> "$GITHUB_OUTPUT"
          echo "Copied to: $DST_REF"

      - name: Keyless sign ECR image (GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.out.outputs.image }}"

      - name: Keyless attest Grype vulnerability predicate to ECR image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMG="${{ steps.out.outputs.image }}"

          grype "$IMG" -o json > grype-new.json

          jq '{
            vulnerabilities: (
              [ .matches[]
                | {
                    id: .vulnerability.id,
                    severity: .vulnerability.severity,
                    package: .artifact.name,
                    installed: (.artifact.version // "")
                  }
              ] | unique
            )
          }' grype-new.json > vuln-predicate.json

          cosign attest \
            --yes \
            --type "https://in-toto.io/Statement/v1" \
            --predicate vuln-predicate.json \
            "$IMG"

  deploy:
    needs: [push-image]
    if: needs.push-image.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.FPD_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
  
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Grype (pinned release)
        run: |
          set -euo pipefail
          GRYPE_VERSION="v0.91.2"
          curl -sSfL "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin grype
          grype version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.33.0"

      - name: Update kubeconfig (EKS)
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ env.EKS_CLUSTER_NAME }}"
          kubectl cluster-info

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "${{ env.NAMESPACE }}" \
            || kubectl create namespace "${{ env.NAMESPACE }}"

      - name: Compute vuln verdict annotations (max severity + critical/high count)
        id: verdict
        run: |
          set -euo pipefail

          IMAGE="${{ needs.push-image.outputs.image }}"
          echo "Scanning image for admission metadata: $IMAGE"

          # If you're scanning a private ECR image, you MUST be logged in earlier in this job:
          # - aws-actions/configure-aws-credentials@v4
          # - aws-actions/amazon-ecr-login@v2
          #
          # (Otherwise grype will fail with 401/no basic auth credentials.)

          grype "$IMAGE" -o json > grype-new.json

          # Count Critical + High (null-safe)
          CRIT_HIGH_COUNT="$(jq -r '
            [(.matches // [])[]?
              | (.vulnerability.severity // "Unknown")
              | select(. == "Critical" or . == "High")
            ] | length
          ' grype-new.json)"

          # Max severity (jq 1.6 compatible; no := assignment)
          MAX_SEV="$(jq -r '
            if   ([ (.matches // [])[]? | (.vulnerability.severity // "Unknown") | select(.=="Critical")  ] | length) > 0 then "Critical"
            elif ([ (.matches // [])[]? | (.vulnerability.severity // "Unknown") | select(.=="High")      ] | length) > 0 then "High"
            elif ([ (.matches // [])[]? | (.vulnerability.severity // "Unknown") | select(.=="Medium")    ] | length) > 0 then "Medium"
            elif ([ (.matches // [])[]? | (.vulnerability.severity // "Unknown") | select(.=="Low")       ] | length) > 0 then "Low"
            elif ([ (.matches // [])[]? | (.vulnerability.severity // "Unknown") | select(.=="Unknown")   ] | length) > 0 then "Unknown"
            elif ([ (.matches // [])[]? | (.vulnerability.severity // "Unknown") | select(.=="Negligible")] | length) > 0 then "Negligible"
            else "None"
            end
          ' grype-new.json)"

          echo "crit_high=$CRIT_HIGH_COUNT" >> "$GITHUB_OUTPUT"
          echo "max_sev=$MAX_SEV" >> "$GITHUB_OUTPUT"

          echo "Computed (for Gatekeeper annotations):"
          echo "  demo.chainguard.dev/ci-run-id=${{ needs.push-image.outputs.ci_run_id }}"
          echo "  demo.chainguard.dev/vuln-critical-high-count=$CRIT_HIGH_COUNT"
          echo "  demo.chainguard.dev/vuln-max-severity=$MAX_SEV"

      - name: Apply manifest with required Gatekeeper annotations (kustomize patch)
        run: |
          set -euo pipefail

          RUN_ID="${{ needs.push-image.outputs.ci_run_id }}"
          MAX_SEV="${{ steps.verdict.outputs.max_sev }}"
          COUNT="${{ steps.verdict.outputs.crit_high }}"

          cat > kustomization.yaml <<'EOF'
          resources:
            - services/python-web/deployment.yaml
          patches:
            - target:
                kind: Deployment
                name: python-demo
              patch: |-
                - op: add
                  path: /spec/template/metadata/annotations
                  value: {}
                - op: add
                  path: /spec/template/metadata/annotations/demo.chainguard.dev~1ci-run-id
                  value: "__RUN_ID__"
                - op: add
                  path: /spec/template/metadata/annotations/demo.chainguard.dev~1vuln-max-severity
                  value: "__MAX_SEV__"
                - op: add
                  path: /spec/template/metadata/annotations/demo.chainguard.dev~1vuln-critical-high-count
                  value: "__COUNT__"
          EOF

          # Escape any characters that could break sed replacement
          esc() { printf '%s' "$1" | sed -e 's/[\/&]/\\&/g'; }

          sed -i "s/__RUN_ID__/$(esc "$RUN_ID")/g" kustomization.yaml
          sed -i "s/__MAX_SEV__/$(esc "$MAX_SEV")/g" kustomization.yaml
          sed -i "s/__COUNT__/$(esc "$COUNT")/g" kustomization.yaml

          kubectl apply -n "${{ env.NAMESPACE }}" -k .

      - name: Patch deployment image (digest) + rollout
        run: |
          set -euo pipefail
          IMAGE="${{ needs.push-image.outputs.image }}"
          echo "Deploying image: $IMAGE"

          kubectl set image -n "${{ env.NAMESPACE }}" \
            deployment/"${{ env.APP_NAME }}" \
            "${{ env.APP_NAME }}"="$IMAGE"

          kubectl rollout status -n "${{ env.NAMESPACE }}" \
            deployment/"${{ env.APP_NAME }}" \
            --timeout=10m